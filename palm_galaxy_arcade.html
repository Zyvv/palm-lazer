
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');
  #pg-wrap { background: #000; width: 100%; min-height: 600px; position: relative; font-family: 'Press Start 2P', monospace; overflow: hidden; border-radius: 8px; }
  #pg-canvas { display: block; width: 100%; height: 560px; }
  #pg-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  #pg-score { position: absolute; top: 12px; left: 16px; color: #00ff88; font-size: 9px; letter-spacing: 1px; text-shadow: 0 0 8px #00ff88; }
  #pg-level { position: absolute; top: 12px; right: 16px; color: #ff00ff; font-size: 9px; letter-spacing: 1px; text-shadow: 0 0 8px #ff00ff; }
  #pg-lives { position: absolute; top: 32px; left: 16px; color: #ffff00; font-size: 8px; text-shadow: 0 0 6px #ffff00; }
  #pg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.82); pointer-events: all; }
  #pg-overlay h1 { font-family: 'Press Start 2P', monospace; color: #00ff88; font-size: 18px; margin: 0 0 8px; text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88; text-align: center; line-height: 1.5; }
  #pg-overlay .sub { font-family: 'Press Start 2P', monospace; color: #ff00ff; font-size: 8px; margin: 0 0 24px; text-shadow: 0 0 10px #ff00ff; text-align: center; line-height: 1.8; }
  #pg-overlay .city-name { font-family: 'Orbitron', sans-serif; color: #00eeff; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; text-shadow: 0 0 12px #00eeff; }
  #pg-btn { font-family: 'Press Start 2P', monospace; background: none; border: 2px solid #00ff88; color: #00ff88; padding: 10px 20px; font-size: 9px; cursor: pointer; pointer-events: all; text-shadow: 0 0 8px #00ff88; box-shadow: 0 0 16px #00ff88; letter-spacing: 1px; margin-bottom: 14px; transition: all 0.15s; }
  #pg-btn:hover { background: #00ff8833; box-shadow: 0 0 30px #00ff88; }
  .ctrl-hint { font-family: 'Press Start 2P', monospace; color: #888; font-size: 7px; text-align: center; line-height: 2.2; margin-top: 8px; }
  #pg-scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px); pointer-events: none; z-index: 10; border-radius: 8px; }
  #pg-final-score { font-family: 'Press Start 2P', monospace; color: #ffff00; font-size: 10px; text-shadow: 0 0 10px #ffff00; margin: 8px 0 16px; text-align: center; }
</style>
<div id="pg-wrap">
  <canvas id="pg-canvas"></canvas>
  <div id="pg-scanlines"></div>
  <div id="pg-ui">
    <div id="pg-score">SCORE: <span id="sc">0</span></div>
    <div id="pg-level">CITY: <span id="lv">—</span></div>
    <div id="pg-lives">LIVES: <span id="lf">♥♥♥</span></div>
  </div>
  <div id="pg-overlay">
    <h1>PALM<br>GALAXY</h1>
    <div class="sub">DODGE THE LASERS<br>SURVIVE EACH CITY</div>
    <div class="city-name" id="ov-city">MIAMI · LEVEL 1</div>
    <div id="pg-final-score" style="display:none"></div>
    <button id="pg-btn">► PLAY</button>
    <div class="ctrl-hint">KEYBOARD: ← → ARROWS<br>TOUCH: TAP LEFT / RIGHT</div>
  </div>
</div>
<script>
const canvas = document.getElementById('pg-canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('pg-overlay');
const ovCity = document.getElementById('ov-city');
const btn = document.getElementById('pg-btn');
const scEl = document.getElementById('sc');
const lvEl = document.getElementById('lv');
const lfEl = document.getElementById('lf');
const fsEl = document.getElementById('pg-final-score');

const CITIES = [
  { name:'Miami', sky:['#0a0a2e','#0d1440','#0a2060'], ground:'#0d0d1a', accent:'#ff3aff', accent2:'#00ffee', buildH:[80,120,60,140,90,110,70,130,50,100], buildW:42 },
  { name:'Tokyo', sky:['#1a0a2e','#2d0a40','#1a0060'], ground:'#100a1a', accent:'#ff006a', accent2:'#00aaff', buildH:[160,80,200,60,140,100,180,70,120,90], buildW:38 },
  { name:'NYC',   sky:['#050510','#0a0a20','#050a30'], ground:'#080810', accent:'#ffcc00', accent2:'#ff4400', buildH:[220,140,260,80,200,160,240,100,180,120], buildW:50 },
  { name:'Dubai', sky:['#100a00','#1a1000','#200800'], ground:'#0a0800', accent:'#ffaa00', accent2:'#ff6600', buildH:[300,100,340,80,260,140,320,90,200,110], buildW:44 },
  { name:'Ibiza', sky:['#000820','#001030','#001840'], ground:'#00060f', accent:'#ff00aa', accent2:'#aa00ff', buildH:[60,40,80,30,70,50,65,35,55,45], buildW:36 },
];

let W, H, raf, state='idle', score=0, level=0, lives=3, frame=0;
let palmX, palmW=38, palmH=90, speed=3, laserSpeed=4;
let lasers=[], spawnTimer=0, spawnRate=120;
let keys={left:false,right:false};
let particles=[];
let hitFlash=0;

function resize(){
  const wrap = document.getElementById('pg-wrap');
  W = wrap.clientWidth; H = 560;
  canvas.width = W; canvas.height = H;
  palmX = palmX || W/2;
}

function drawCity(city){
  const sw = W / city.buildH.length;
  const groundY = H - 80;
  for(let i=0;i<city.buildH.length;i++){
    const bw = sw - 4;
    const bh = city.buildH[i] * (1 + level*0.08);
    const bx = i*sw + 2;
    const by = groundY - bh;
    ctx.fillStyle = '#111122';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = city.accent + '55';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(bx, by, bw, bh);
    // windows
    for(let wy=by+6; wy<groundY-6; wy+=10){
      for(let wx=bx+4; wx<bx+bw-6; wx+=8){
        if(Math.random()<0.45){
          ctx.fillStyle = Math.random()<0.6 ? city.accent+'bb' : city.accent2+'88';
          ctx.fillRect(wx, wy, 4, 5);
        }
      }
    }
  }
  // ground
  ctx.fillStyle = city.ground;
  ctx.fillRect(0, groundY, W, H - groundY);
  ctx.strokeStyle = city.accent + '99';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,groundY); ctx.lineTo(W,groundY); ctx.stroke();
  // neon floor glow
  const grd = ctx.createLinearGradient(0,groundY,0,groundY+20);
  grd.addColorStop(0, city.accent+'44');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(0,groundY,W,20);
}

function drawSky(city){
  const grd = ctx.createLinearGradient(0,0,0,H-80);
  grd.addColorStop(0, city.sky[0]);
  grd.addColorStop(0.5, city.sky[1]);
  grd.addColorStop(1, city.sky[2]);
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H-80);
  // stars
  ctx.fillStyle='#ffffff';
  for(let i=0;i<80;i++){
    const sx=(i*137.5+frame*0.05)%W;
    const sy=(i*73.1)%(H*0.6);
    const ss=Math.random()<0.02?1.5:0.8;
    ctx.globalAlpha=0.4+0.6*Math.sin(frame*0.05+i);
    ctx.fillRect(sx,sy,ss,ss);
  }
  ctx.globalAlpha=1;
  // moon
  ctx.fillStyle='#fffde8';
  ctx.beginPath(); ctx.arc(W-80,50,18,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=city.sky[1];
  ctx.beginPath(); ctx.arc(W-73,46,16,0,Math.PI*2); ctx.fill();
}

function drawPalm(x, city){
  const gY = H - 80;
  const tx = x;
  const ty = gY - palmH;
  // trunk
  const trunkW = [6,8,9,8,7,6,5];
  for(let i=0;i<trunkW.length;i++){
    const segH = palmH/trunkW.length;
    const tx2 = tx - trunkW[i]/2;
    const ty2 = ty + i*segH;
    ctx.fillStyle = i%2===0 ? '#5a3a1a' : '#4a2e12';
    ctx.fillRect(tx2, ty2, trunkW[i], segH+1);
  }
  // fronds
  const fronds=[
    {dx:-30,dy:-20,rot:-0.6}, {dx:-20,dy:-30,rot:-0.3}, {dx:0,dy:-35,rot:0},
    {dx:20,dy:-30,rot:0.3}, {dx:30,dy:-20,rot:0.6}, {dx:-15,dy:-15,rot:-0.9}, {dx:15,dy:-15,rot:0.9}
  ];
  fronds.forEach(f=>{
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(f.rot);
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(f.dx*0.3, f.dy*0.3+5, f.dx*0.7, f.dy*0.7+8, f.dx, f.dy);
    ctx.strokeStyle='#2d8b00';
    ctx.lineWidth=4;
    ctx.stroke();
    ctx.strokeStyle='#3aaa00';
    ctx.lineWidth=2;
    ctx.stroke();
    ctx.restore();
  });
  // coconuts
  ctx.fillStyle='#8b5a00';
  ctx.beginPath(); ctx.arc(tx-8, ty+6, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(tx+6, ty+10, 4, 0, Math.PI*2); ctx.fill();

  if(hitFlash>0){
    ctx.fillStyle = 'rgba(255,50,50,'+(hitFlash/10)+')';
    ctx.beginPath(); ctx.arc(tx, ty+20, 30, 0, Math.PI*2); ctx.fill();
    hitFlash--;
  }
}

function drawLaser(laser, city){
  const t = frame * 0.1;
  // core beam
  const grd = ctx.createLinearGradient(laser.x1,0,laser.x2,0);
  if(laser.side==='left'){
    grd.addColorStop(0, city.accent);
    grd.addColorStop(1, city.accent+'00');
  } else {
    grd.addColorStop(0, city.accent2+'00');
    grd.addColorStop(1, city.accent2);
  }
  ctx.strokeStyle = laser.side==='left' ? city.accent : city.accent2;
  ctx.lineWidth = 3;
  ctx.shadowColor = laser.side==='left' ? city.accent : city.accent2;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(laser.x1, laser.y);
  ctx.lineTo(laser.x2, laser.y);
  ctx.stroke();
  ctx.shadowBlur = 0;
  // outer glow
  ctx.strokeStyle = (laser.side==='left' ? city.accent : city.accent2)+'44';
  ctx.lineWidth = 7;
  ctx.beginPath();
  ctx.moveTo(laser.x1, laser.y);
  ctx.lineTo(laser.x2, laser.y);
  ctx.stroke();
}

function spawnLaser(){
  const city = CITIES[level % CITIES.length];
  const side = Math.random()<0.5 ? 'left' : 'right';
  const y = (H-120) * 0.25 + Math.random()*(H-220)*0.5;
  const spd = laserSpeed * (1 + level*0.15 + Math.random()*0.5);
  if(side==='left'){
    lasers.push({side:'left', x1:-20, x2:0, y, speed:spd, active:true});
  } else {
    lasers.push({side:'right', x1:W, x2:W+20, y, speed:-spd, active:true});
  }
}

function addParticles(x, y, color){
  for(let i=0;i<14;i++){
    const a = Math.random()*Math.PI*2;
    const s = 1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30,color});
  }
}

function drawParticles(){
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    ctx.globalAlpha = p.life/30;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-1,p.y-1,3,3);
    p.x+=p.vx; p.y+=p.vy; p.life--;
  });
  ctx.globalAlpha=1;
}

function drawHUD(){
  const city = CITIES[level%CITIES.length];
  // top bar glow
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(0,0,W,55);
  ctx.strokeStyle=city.accent+'66';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,55); ctx.lineTo(W,55); ctx.stroke();
  scEl.textContent = score;
  lvEl.textContent = CITIES[level%CITIES.length].name.toUpperCase();
  lfEl.textContent = '♥'.repeat(lives) + '♡'.repeat(Math.max(0,3-lives));
}

function checkCollision(){
  const city = CITIES[level%CITIES.length];
  const px = palmX;
  const gY = H - 80;
  lasers.forEach(laser=>{
    if(!laser.active) return;
    const laserLeft = Math.min(laser.x1,laser.x2);
    const laserRight = Math.max(laser.x1,laser.x2);
    if(laser.y > gY-palmH-10 && laser.y < gY+5 &&
       laserRight > px-palmW/2+5 && laserLeft < px+palmW/2-5){
      laser.active=false;
      lives--;
      hitFlash=12;
      addParticles(px, laser.y, city.accent);
      if(lives<=0){ endGame(); }
    }
  });
}

function update(){
  if(state!=='playing') return;
  frame++;
  score = Math.floor(frame/6) * (level+1);
  const mv = speed + level*0.5;
  if(keys.left)  palmX = Math.max(palmW/2+5, palmX - mv);
  if(keys.right) palmX = Math.min(W-palmW/2-5, palmX + mv);
  // spawn
  spawnTimer++;
  const curRate = Math.max(35, spawnRate - level*10);
  if(spawnTimer >= curRate){ spawnTimer=0; spawnLaser(); }
  // occasionally double-spawn at higher levels
  if(level>=2 && spawnTimer===Math.floor(curRate/2) && Math.random()<0.4) spawnLaser();
  // move lasers
  lasers.forEach(l=>{
    l.x1+=l.speed; l.x2+=l.speed;
  });
  lasers = lasers.filter(l=> l.x2>-50 && l.x1<W+50 && l.active!==false);
  // level up every 15s
  const newLevel = Math.floor(frame / (60*15));
  if(newLevel > level){ level = newLevel; lasers=[]; }
  checkCollision();
}

function drawGame(){
  const city = CITIES[level%CITIES.length];
  ctx.clearRect(0,0,W,H);
  drawSky(city);
  drawCity(city);
  lasers.forEach(l=> drawLaser(l, city));
  drawPalm(palmX, city);
  drawParticles();
  drawHUD();
}

function loop(){
  update();
  drawGame();
  raf = requestAnimationFrame(loop);
}

function startGame(){
  state='playing'; score=0; level=0; lives=3; frame=0;
  palmX = W/2; lasers=[]; particles=[]; spawnTimer=0; hitFlash=0;
  overlay.style.display='none';
  loop();
}

function endGame(){
  state='gameover';
  cancelAnimationFrame(raf);
  overlay.style.display='flex';
  document.querySelector('#pg-overlay h1').textContent='GAME OVER';
  document.querySelector('#pg-overlay .sub').textContent='YOU SURVIVED THE LASERS\nFOR A MOMENT...';
  ovCity.textContent='FINAL CITY: ' + CITIES[level%CITIES.length].name.toUpperCase();
  fsEl.style.display='block';
  fsEl.textContent='SCORE: ' + score;
  btn.textContent='► RETRY';
}

btn.addEventListener('click', ()=>{
  cancelAnimationFrame(raf);
  document.querySelector('#pg-overlay h1').innerHTML='PALM<br>GALAXY';
  document.querySelector('#pg-overlay .sub').textContent='DODGE THE LASERS\nSURVIVE EACH CITY';
  fsEl.style.display='none';
  btn.textContent='► PLAY';
  startGame();
});

window.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft'||e.key==='a') keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d') keys.right=true;
  e.preventDefault();
});
window.addEventListener('keyup', e=>{
  if(e.key==='ArrowLeft'||e.key==='a') keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d') keys.right=false;
});

// touch
let touchStartX=null;
canvas.addEventListener('touchstart', e=>{ touchStartX=e.touches[0].clientX; e.preventDefault(); },{passive:false});
canvas.addEventListener('touchmove', e=>{
  const cx=e.touches[0].clientX;
  keys.left = cx < touchStartX - 10;
  keys.right = cx > touchStartX + 10;
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend', ()=>{ keys.left=keys.right=false; });

// tap left/right half
canvas.addEventListener('click', e=>{
  if(state!=='playing') return;
  const rect=canvas.getBoundingClientRect();
  const cx=e.clientX-rect.left;
  if(cx < W/2){ keys.left=true; setTimeout(()=>keys.left=false,200); }
  else { keys.right=true; setTimeout(()=>keys.right=false,200); }
});

resize();
// draw static first frame
drawSky(CITIES[0]); drawCity(CITIES[0]);
drawPalm(W/2, CITIES[0]);
</script>
